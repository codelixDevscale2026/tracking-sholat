name: Deploy Tracking Sholat to GHCR & VPS

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  # Nama repo lower-case untuk image (misal: codelixdevscale2026/tracking-sholat)
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner name
        run: |
          echo "OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/tracking-sholat-api:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Build and push Platform Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/platform/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER_LOWER }}/tracking-sholat-platform:latest
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            OWNER_LOWER=$(echo ${{ github.repository_owner }} | tr '[:upper:]' '[:lower:]')
            
            # 1. UPDATE FILE KONFIGURASI DI VPS (docker-compose.yml, dll)
            cd ~/tracking-sholat
            git fetch origin main
            git reset --hard origin/main # Paksa update ke versi terbaru dari GitHub
            
            # 2. Login ke GHCR
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. Pull image terbaru yang sudah di-build GitHub
            docker pull ghcr.io/${OWNER_LOWER}/tracking-sholat-api:latest
            docker pull ghcr.io/${OWNER_LOWER}/tracking-sholat-platform:latest
            
            # 4. Jalankan Compose (Pastikan GITHUB_REPOSITORY_OWNER lowercase diteruskan)
            export GITHUB_REPOSITORY_OWNER=${OWNER_LOWER}
            # Paksa Docker hanya PULL, jangan BUILD di VPS
            docker compose up -d --force-recreate --no-build
            
            # 5. Bersihkan image lama
            docker image prune -f